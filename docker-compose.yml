services:
  sql-server-db:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: sql-server-db
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong!Passw0rd
    ports:
      - "1433:1433"
    networks:
      - techmove-network
    volumes:
      - sql_data:/var/opt/mssql

  techmove-api:
    build:
      context: ./TechMove-API
      dockerfile: Dockerfile
    container_name: techmove-api
    environment:
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__TechMoveDbContext=Server=sql-server-db;Database=TechMoveDb;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;
    depends_on:
      - sql-server-db
    ports:
      - "5000:5000"
    networks:
      - techmove-network

  gumani-mvc:
    build:
      context: ./Gumani_Moila_EAPD7111w_POE
      dockerfile: Dockerfile
    container_name: gumani-mvc
    environment:
      - ASPNETCORE_URLS=http://+:8080
    depends_on:
      - techmove-api
    ports:
      - "8080:8080"
      - "8081:8081"
    networks:
      - techmove-network

networks:
  techmove-network:
    driver: bridge

volumes:
  sql_data:
